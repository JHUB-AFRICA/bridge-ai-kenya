<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - BRIDGE-AI Kenya</title>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f8fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
        }
        .error-container {
            text-align: center;
            max-width: 500px;
            padding: 48px 40px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 16px 56px rgba(0,0,0,0.06);
        }
        .error-container .error-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 16px;
        }
        .error-container h1 {
            font-size: 2.4rem;
            font-weight: 800;
            color: #081a28;
            margin: 0;
        }
        .error-container p {
            color: #5a6a7a;
            font-size: 1.05rem;
            margin: 8px 0 24px;
        }
        .error-container .btn {
            display: inline-block;
            padding: 12px 32px;
            background: #1a4a6b;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .error-container .btn:hover {
            background: #0f2b3d;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <span class="error-icon">⚠️</span>
        <h1>500</h1>
        <p>Something went wrong on our end. Please try again later.</p>
        <a href="/" class="btn">Return Home</a>
    </div>
</body>
</html>
