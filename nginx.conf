# ================================================================
# BRIDGE-AI KENYA - Nginx Configuration (JSON Version)
# ================================================================
# This is the main Nginx configuration file for production.
# It handles reverse proxy, static files, and SSL termination.
# No database needed - uses JSON file storage.
# ================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # ================================================================
    # Basic Settings
    # ================================================================
    
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    
    # ================================================================
    # Gzip Compression
    # ================================================================
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_disable "msie6";
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        application/octet-stream
        image/svg+xml
        image/x-icon
        font/woff
        font/woff2;
    
    # ================================================================
    # Security Headers
    # ================================================================
    
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # ================================================================
    # Rate Limiting
    # ================================================================
    
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=3r/m;
    
    # ================================================================
    # Upstream - Flask Application
    # ================================================================
    
    upstream flask_app {
        server web:5000 max_fails=3 fail_timeout=30s;
    }
    
    # ================================================================
    # Server Block - HTTP (Redirect to HTTPS)
    # ================================================================
    
    server {
        listen 80;
        server_name jhubafrica.com www.jhubafrica.com localhost;
        
        # Redirect HTTP to HTTPS (except for localhost)
        if ($host !~* ^localhost$ ) {
            return 301 https://$host$request_uri;
        }
        
        # For localhost, just serve the app directly
        location / {
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    # ================================================================
    # Server Block - HTTPS (Production)
    # ================================================================
    
    server {
        listen 443 ssl http2;
        server_name jhubafrica.com www.jhubafrica.com;
        
        # ================================================================
        # SSL Certificate
        # ================================================================
        # IMPORTANT: Replace these with your actual certificate paths
        # ================================================================
        
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_trusted_certificate /etc/nginx/ssl/ca.crt;
        
        # ================================================================
        # SSL Protocol & Cipher Settings
        # ================================================================
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        
        # ================================================================
        # SSL Session Cache & Tickets
        # ================================================================
        
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        
        # ================================================================
        # HSTS (HTTP Strict Transport Security)
        # ================================================================
        
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # ================================================================
        # Security Headers (HTTPS-specific)
        # ================================================================
        
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # ================================================================
        # Static Files
        # ================================================================
        
        location /static/ {
            alias /static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        location /uploads/ {
            alias /uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        location /gallery/ {
            alias /gallery/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        location /hero/ {
            alias /hero/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # ================================================================
        # Favicon & Robots
        # ================================================================
        
        location /favicon.ico {
            alias /static/images/icons/favicon.ico;
            access_log off;
            log_not_found off;
        }
        
        location /robots.txt {
            alias /static/robots.txt;
            access_log off;
            log_not_found off;
        }
        
        # ================================================================
        # Health Check Endpoint
        # ================================================================
        
        location /health {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }
        
        # ================================================================
        # Rate Limiting for API and Login
        # ================================================================
        
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /admin/login/ {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # ================================================================
        # Main Application Proxy
        # ================================================================
        
        location / {
            proxy_pass http://flask_app;
            include /etc/nginx/proxy_params;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        # ================================================================
        # Error Pages
        # ================================================================
        
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }
        
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
        }
    }
}

# ================================================================
# Include additional server blocks if needed
# ================================================================

